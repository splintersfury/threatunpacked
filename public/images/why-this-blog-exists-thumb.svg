<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <rect width="96" height="96" fill="#0f172a"/>
  <!-- Terminal window -->
  <rect x="8" y="8" width="80" height="80" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="8" y="8" width="80" height="14" rx="4" fill="#1e293b"/>
  <rect x="8" y="15" width="80" height="7" fill="#1e293b"/>
  <circle cx="18" cy="15" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="27" cy="15" r="3" fill="#f59e0b" opacity="0.7"/>
  <circle cx="36" cy="15" r="3" fill="#22c55e" opacity="0.7"/>
  <text x="58" y="18" font-family="monospace" font-size="5.5" fill="#475569" text-anchor="middle">threat_unpacked</text>
  <!-- Terminal lines -->
  <text x="14" y="34" font-family="monospace" font-size="6" fill="#38bdf8">$ whoami</text>
  <text x="14" y="43" font-family="monospace" font-size="6" fill="#94a3b8">splintersfury</text>
  <text x="14" y="54" font-family="monospace" font-size="6" fill="#38bdf8">$ cat why.md</text>
  <text x="14" y="63" font-family="monospace" font-size="5.5" fill="#64748b">less what · more why</text>
  <text x="14" y="71" font-family="monospace" font-size="5.5" fill="#64748b">it matters during IR</text>
  <!-- Cursor -->
  <text x="14" y="81" font-family="monospace" font-size="6" fill="#38bdf8">$ <tspan fill="#38bdf8" opacity="0.9">▮</tspan></text>
</svg>
