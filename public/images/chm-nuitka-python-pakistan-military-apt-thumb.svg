  <text x="73" y="36" font-family="serif" font-size="11" fill="#3b82f6" text-anchor="middle">🐍</text>
  <text x="73" y="48" font-family="monospace" font-size="5" fill="#64748b" text-anchor="middle">.exe→.py</text>
  <!-- APT label -->
  <rect x="56" y="60" width="34" height="12" rx="2" fill="#450a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text x="73" y="69" font-family="monospace" font-size="6" fill="#fca5a5" text-anchor="middle">APT</text>
  <rect x="56" y="76" width="34" height="12" rx="2" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="73" y="85" font-family="monospace" font-size="5.5" fill="#94a3b8" text-anchor="middle">0 det.</text>
