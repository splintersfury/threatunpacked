<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <rect width="96" height="96" fill="#0f172a"/>
  <!-- Pakistan green accent left bar -->
  <rect x="0" y="0" width="6" height="96" fill="#01411c"/>
  <!-- CHM file icon -->
  <rect x="14" y="10" width="36" height="44" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="14" y="10" width="36" height="12" rx="3" fill="#166534" opacity="0.7"/>
  <text x="32" y="20.5" font-family="monospace" font-size="7" fill="#86efac" text-anchor="middle">.chm</text>
  <text x="32" y="34" font-family="monospace" font-size="5.5" fill="#64748b" text-anchor="middle">military</text>
  <text x="32" y="42" font-family="monospace" font-size="5.5" fill="#64748b" text-anchor="middle">budget.chm</text>
  <text x="32" y="50" font-family="monospace" font-size="5.5" fill="#64748b" text-anchor="middle">2025-26</text>
  <!-- Arrow down -->
  <line x1="32" y1="56" x2="32" y2="66" stroke="#475569" stroke-width="1.2"/>
  <polygon points="32,70 29,64 35,64" fill="#475569"/>
  <!-- CDN node -->
  <ellipse cx="32" cy="78" rx="16" ry="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="0.8"/>
