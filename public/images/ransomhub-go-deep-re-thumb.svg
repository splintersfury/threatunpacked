<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <rect width="96" height="96" fill="#0f172a"/>
  <!-- RansomHub blue accent top stripe -->
  <rect x="0" y="0" width="96" height="3" fill="#3b82f6" opacity="0.9"/>
  <!-- Go gopher-style label -->
  <rect x="6" y="7" width="26" height="14" rx="2" fill="#1e293b" stroke="#06b6d4" stroke-width="0.7"/>
  <text x="19" y="17" font-family="monospace" font-size="5.5" fill="#67e8f9" text-anchor="middle">Go + garble</text>
  <!-- Arrow -->
  <line x1="32" y1="14" x2="40" y2="14" stroke="#475569" stroke-width="1"/>
  <polygon points="42,14 39,12.5 39,15.5" fill="#475569"/>
  <!-- PE badge -->
  <rect x="42" y="7" width="48" height="14" rx="2" fill="#1e293b" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="66" y="14" font-family="monospace" font-size="4" fill="#64748b" text-anchor="middle">ransomhub.exe</text>
  <text x="66" y="19" font-family="monospace" font-size="3.5" fill="#475569" text-anchor="middle">10.62 MB · PE64 console</text>
  <!-- Crypto row -->
  <rect x="6" y="27" width="38" height="13" rx="2" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.6"/>
  <text x="25" y="34" font-family="monospace" font-size="4.5" fill="#c4b5fd" text-anchor="middle">X25519 ECDH</text>
  <text x="25" y="38.5" font-family="monospace" font-size="3.5" fill="#4c1d95" text-anchor="middle">ChaCha20 · XORKeyStream</text>
  <line x1="44" y1="33" x2="50" y2="33" stroke="#334155" stroke-width="0.8"/>
  <rect x="50" y="27" width="40" height="13" rx="2" fill="#1e293b" stroke="#f59e0b" stroke-width="0.6"/>
  <text x="70" y="34" font-family="monospace" font-size="4.5" fill="#fbbf24" text-anchor="middle">IOCP thread pool</text>
  <text x="70" y="38.5" font-family="monospace" font-size="3.5" fill="#78350f" text-anchor="middle">intermittent enc</text>
  <!-- SMB row -->
  <rect x="6" y="46" width="84" height="13" rx="2" fill="#0c1a2e" stroke="#3b82f6" stroke-width="0.6"/>
  <text x="48" y="52.5" font-family="monospace" font-size="4.5" fill="#60a5fa" text-anchor="middle">built-in SMB · SPNEGO/NTLM auth</text>
  <text x="48" y="57" font-family="monospace" font-size="3.5" fill="#1e3a5f" text-anchor="middle">NegTokenInit · NegTokenResp · ADMIN$ · SYSVOL</text>
  <!-- Config row -->
  <rect x="6" y="65" width="84" height="12" rx="2" fill="#1c1917" stroke="#78716c" stroke-width="0.5"/>
  <text x="48" y="71.5" font-family="monospace" font-size="4" fill="#a8a29e" text-anchor="middle">JSON config: extension · master_public_key</text>
  <text x="48" y="76" font-family="monospace" font-size="3.5" fill="#57534e" text-anchor="middle">note_file_name · note_full_text · network_shares</text>
  <!-- Bottom bar -->
  <rect x="6" y="83" width="84" height="10" rx="2" fill="#450a0a" stroke="#ef4444" stroke-width="0.5"/>
  <text x="48" y="91" font-family="monospace" font-size="4.5" fill="#fca5a5" text-anchor="middle">500+ victims · Feb 2024 → present · #1 active RaaS</text>
</svg>
