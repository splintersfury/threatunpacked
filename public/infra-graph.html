const COLOR = {
  IP:     "#60A5FA",
  Domain: "#34D399",
  Sample: "#FBBF24",
  Actor:  "#F87171",
  Infra:  "#A855F7",
};
const EDGE_COLOR = {
  BEACONS_TO:              "#60A5FA",
  RESOLVES_TO:             "#34D399",
  HOSTED_ON:               "#818CF8",
  HOSTS:                   "#22D3EE",
  STAGED_ON:               "#FBBF24",
  DROPS:                   "#F87171",
  SAME_SSH_KEY:            "#F472B6",
  SAME_REGISTRANT_PATTERN: "#C084FC",
  BUILT_WITH:              "#FB923C",
  LEAKED_FROM:             "#6EE7B7",
  LINKED_TO:               "#475569",
};

const width  = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#graph")
  .attr("width", width).attr("height", height);

const g = svg.append("g");

// zoom + pan
const zoom = d3.zoom()
  .scaleExtent([0.1, 8])
  .on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

// Reset on R
document.addEventListener("keydown", e => {
  if (e.key === "r" || e.key === "R") {
    svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
  }
});

// build index map
const nodeById = {};
graphData.nodes.forEach(n => nodeById[n.id] = n);

// simulation
const sim = d3.forceSimulation(graphData.nodes)
  .force("link", d3.forceLink(graphData.links)
    .id(d => d.id)
    .distance(d => {
      const types = new Set([nodeById[d.source.id || d.source]?.label,
                             nodeById[d.target.id || d.target]?.label]);
      if (types.has("Actor")) return 180;
      if (types.has("Sample")) return 130;
      return 100;
    })
    .strength(0.5))
  .force("charge", d3.forceManyBody().strength(-220))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collide", d3.forceCollide(28));

// links
const link = g.append("g").selectAll("line")
  .data(graphData.links).join("line")
  .attr("class", "link")
  .attr("stroke", d => EDGE_COLOR[d.rel] || "#475569")
  .attr("stroke-width", 1.2)
  .attr("marker-end", "url(#arrow)");

// nodes
const node = g.append("g").selectAll(".node")
  .data(graphData.nodes).join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end",   (e, d) => { if (!e.active) sim.alphaTarget(0); })
  );

const radius = d => d.label === "Actor" ? 14 : d.label === "Sample" ? 9 : 11;

node.append("circle")
  .attr("r", radius)
  .attr("fill", d => COLOR[d.label] || "#94A3B8");

node.append("text")
  .attr("dy", d => radius(d) + 12)
  .attr("text-anchor", "middle")
  .text(d => d.name.length > 20 ? d.name.slice(0, 18) + "…" : d.name);

// tooltip
const tt = document.getElementById("tooltip");
node.on("mousemove", (e, d) => {
  const color = COLOR[d.label] || "#94A3B8";
  tt.style.display = "block";
  tt.style.left = (e.clientX + 16) + "px";
  tt.style.top  = (e.clientY + 16) + "px";
  tt.innerHTML = `
    <div class="tt-name">${d.name}</div>
    <span class="tt-label" style="background:${color}22;color:${color};border:1px solid ${color}44">${d.label}</span>
    ${d.role ? `<div class="tt-line">Role: <span>${d.role}</span></div>` : ""}
    ${d.geo  ? `<div class="tt-line">Geo: <span>${d.geo}</span></div>` : ""}
    ${d.provider ? `<div class="tt-line">Provider: <span>${d.provider}</span></div>` : ""}
    ${d.notes ? `<div class="tt-line" style="margin-top:4px;color:#8B949E;font-size:10px">${d.notes}</div>` : ""}
  `;
})
.on("mouseleave", () => { tt.style.display = "none"; });

// highlight connected on click
let selected = null;
node.on("click", (e, d) => {
  e.stopPropagation();
  if (selected === d.id) { selected = null; resetHighlight(); return; }
  selected = d.id;
  const connected = new Set([d.id]);
  graphData.links.forEach(l => {
    const s = l.source.id ?? l.source, t = l.target.id ?? l.target;
    if (s === d.id) connected.add(t);
    if (t === d.id) connected.add(s);
  });
  node.selectAll("circle")
    .attr("opacity", n => connected.has(n.id) ? 1 : 0.2);
  node.selectAll("text")
    .attr("opacity", n => connected.has(n.id) ? 1 : 0.2);
  link.attr("opacity", l => {
    const s = l.source.id ?? l.source, t = l.target.id ?? l.target;
    return (s === d.id || t === d.id) ? 1 : 0.05;
  });
});
svg.on("click", resetHighlight);

function resetHighlight() {
  selected = null;
  node.selectAll("circle").attr("opacity", 1);
  node.selectAll("text").attr("opacity", 1);
  link.attr("opacity", 0.55);
}

// filter buttons
const filterDiv = document.getElementById("filter");
const types = ["IP", "Domain", "Sample", "Actor", "Infra"];
const activeTypes = new Set(types);

types.forEach(t => {
  const btn = document.createElement("div");
  btn.className = "filter-btn active";
  btn.style.background = COLOR[t] + "22";
  btn.style.color = COLOR[t];
  btn.style.borderColor = COLOR[t] + "44";
  btn.textContent = t;
  btn.dataset.type = t;
  btn.addEventListener("click", () => {
    if (activeTypes.has(t)) { activeTypes.delete(t); btn.className = "filter-btn inactive"; }
    else { activeTypes.add(t); btn.className = "filter-btn active"; }
    node.attr("display", d => activeTypes.has(d.label) ? null : "none");
    link.attr("display", l => {
      const sn = nodeById[l.source.id ?? l.source];
      const tn = nodeById[l.target.id ?? l.target];
      return (activeTypes.has(sn?.label) && activeTypes.has(tn?.label)) ? null : "none";
    });
  });
  filterDiv.appendChild(btn);
});

// simulation tick
sim.on("tick", () => {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return d.target.x - dx/dist * (radius(d.target) + 8);
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return d.target.y - dy/dist * (radius(d.target) + 8);
    });

  node.attr("transform", d => `translate(${d.x},${d.y})`);
});
